        /* Alapvető menü formázás a style.css kiegészítéseként */
        nav { background-color: #2c3e50; padding: 1rem; color: white; margin-bottom: 20px; }
        nav .container { width: 100%; max-width: none; display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }

        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .form-group { margin-bottom: 15px; }
        .form-control { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background-color: #3498db; color: white; }
    </style>
</head>
