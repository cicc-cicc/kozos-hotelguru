name: Python CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.14]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Use SQLite for tests
      run: |
        echo "DATABASE_URL=sqlite+pysqlite:///./test.db" >> $GITHUB_ENV

    - name: Run linters (pre-commit)
      run: |
        # Use python -m pre_commit to avoid PATH issues on runners
        python -m pre_commit --version || true
        which pre-commit || true
        python -m pre_commit run --all-files

    - name: Run tests
      run: |
        pytest -q
